<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Libnan TV — Live Arabic Television</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080a0d;
  --bg2:#0d1117;
  --bg3:#111820;
  --surface:#141c26;
  --surface2:#1a2535;
  --border:#1e2d3d;
  --green:#00d97e;
  --green2:#00b869;
  --green-glow:rgba(0,217,126,0.15);
  --red:#e63946;
  --red-glow:rgba(230,57,70,0.2);
  --gold:#f4b942;
  --white:#f0f4f8;
  --muted:#6b7f96;
  --text:#cdd9e5;
  --font:'Outfit',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:var(--font);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:2px}

/* ─── HEADER ─── */
#hdr{
  height:58px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;
  background:linear-gradient(to bottom,rgba(8,10,13,0.98),rgba(8,10,13,0.7));
  border-bottom:1px solid var(--border);
  position:relative;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--green),#007a45);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#000;
  box-shadow:0 0 18px var(--green-glow);
  letter-spacing:-0.5px;
  font-family:'Cairo',sans-serif;
}
.logo-text{font-size:19px;font-weight:900;letter-spacing:-0.5px;color:var(--white)}
.logo-text span{color:var(--green)}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.clock{font-size:14px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:1px}
.live-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--red-glow);border:1px solid rgba(230,57,70,0.3);
  border-radius:20px;padding:4px 10px;
  font-size:9px;font-weight:700;color:var(--red);letter-spacing:1.5px
}
.dot{width:5px;height:5px;border-radius:50%;animation:blink 1.4s infinite}
.dot-red{background:var(--red);box-shadow:0 0 6px var(--red)}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-amber{background:var(--gold)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* ─── NAV ─── */
#nav{
  height:44px;flex-shrink:0;display:flex;align-items:stretch;
  padding:0 20px;background:var(--bg2);
  border-bottom:1px solid var(--border);overflow-x:auto;gap:2px
}
#nav::-webkit-scrollbar{display:none}
.nt{
  flex-shrink:0;padding:0 16px;background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:color 0.2s,border-color 0.2s;
  font-family:var(--font);letter-spacing:0.3px
}
.nt:hover{color:var(--text)}
.nt.on{color:var(--green);border-bottom-color:var(--green)}
.nb{
  background:var(--surface);border-radius:4px;
  padding:1px 5px;font-size:10px;margin-left:4px;color:var(--muted)
}
.nt.on .nb{background:rgba(0,217,126,0.12);color:var(--green)}

/* ─── BODY ─── */
#body{flex:1;overflow:hidden;position:relative}
.sc{display:none;position:absolute;inset:0;overflow-y:auto}
.sc.on{display:block}
.sc-flex{display:none;position:absolute;inset:0}
.sc-flex.on{display:flex}

/* ─── HOME ─── */
.home-wrap{padding-bottom:30px}

/* Hero Carousel */
#hero{
  position:relative;height:320px;overflow:hidden;
  background:var(--bg);
  flex-shrink:0;
}
.hero-slide{
  position:absolute;inset:0;
  display:flex;align-items:flex-end;
  padding:30px 28px;
  opacity:0;transition:opacity 0.7s ease;
  pointer-events:none;
}
.hero-slide.active{opacity:1;pointer-events:all}
.hero-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(0px);
  transition:transform 8s ease;
}
.hero-slide.active .hero-bg{transform:scale(1.04)}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(
    to right,
    rgba(8,10,13,0.97) 0%,
    rgba(8,10,13,0.8) 40%,
    rgba(8,10,13,0.3) 70%,
    rgba(8,10,13,0.1) 100%
  ),linear-gradient(to top,rgba(8,10,13,0.95) 0%,transparent 50%)
}
.hero-content{position:relative;z-index:2;max-width:420px}
.hero-cat{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--green);
  margin-bottom:8px;display:flex;align-items:center;gap:6px
}
.hero-cat::before{content:'';width:18px;height:2px;background:var(--green);border-radius:1px}
.hero-title{
  font-size:28px;font-weight:900;line-height:1.1;
  color:var(--white);margin-bottom:6px;
  letter-spacing:-0.5px
}
.hero-sub{font-size:12px;color:rgba(205,217,229,0.7);margin-bottom:16px;line-height:1.5}
.hero-btns{display:flex;gap:10px;align-items:center}
.btn-watch{
  display:flex;align-items:center;gap:7px;
  background:var(--green);color:#000;
  border:none;border-radius:8px;padding:9px 18px;
  font-size:12px;font-weight:800;cursor:pointer;
  font-family:var(--font);letter-spacing:0.3px;
  transition:background 0.2s,transform 0.1s;
  box-shadow:0 0 20px var(--green-glow)
}
.btn-watch:hover{background:var(--green2);transform:translateY(-1px)}
.btn-watch:active{transform:translateY(0)}
.btn-info{
  background:rgba(240,244,248,0.08);border:1px solid rgba(240,244,248,0.15);
  color:var(--text);border-radius:8px;padding:9px 16px;
  font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:background 0.2s
}
.btn-info:hover{background:rgba(240,244,248,0.14)}
.play-icon{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid #000}

/* Carousel dots */
#hero-dots{
  position:absolute;bottom:14px;right:20px;
  display:flex;gap:5px;z-index:10
}
.hdot{
  width:6px;height:6px;border-radius:3px;
  background:rgba(240,244,248,0.25);
  cursor:pointer;transition:all 0.3s
}
.hdot.on{width:20px;background:var(--green)}

/* Hero logo badge */
.hero-logo-badge{
  position:absolute;top:20px;right:20px;z-index:10;
  width:64px;height:64px;border-radius:12px;
  background:rgba(13,17,23,0.85);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);overflow:hidden
}
.hero-logo-badge img{width:48px;height:48px;object-fit:contain}
.hero-logo-badge .hero-logo-text{
  font-size:11px;font-weight:800;color:var(--white);
  text-align:center;padding:4px;line-height:1.2
}

/* ─── SECTION ROWS ─── */
.home-sections{padding:0 0 20px}
.home-section{margin-bottom:6px}
.sec-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 20px 10px
}
.sec-title{
  font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:8px;
  color:var(--white);letter-spacing:0.2px
}
.sec-bar{width:3px;height:14px;background:var(--green);border-radius:2px;flex-shrink:0}
.sec-bar.red{background:var(--red)}
.sec-bar.gold{background:var(--gold)}
.sec-more{
  font-size:11px;color:var(--green);cursor:pointer;
  background:none;border:none;font-family:var(--font);
  font-weight:600;opacity:0.8;
  transition:opacity 0.2s
}
.sec-more:hover{opacity:1}
.ch-row{
  display:flex;gap:10px;overflow-x:auto;
  padding:0 20px 8px;
}
.ch-row::-webkit-scrollbar{display:none}
.empty-msg{color:var(--muted);font-size:12px;padding:8px 20px}

/* ─── CHANNEL CARDS (row) ─── */
.row-card{
  flex-shrink:0;width:130px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  cursor:pointer;
  transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;
  position:relative
}
.row-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--green);
  box-shadow:0 8px 30px rgba(0,0,0,0.5),0 0 20px var(--green-glow)
}
.row-card:active{transform:scale(0.97)}
.rc-art{
  height:72px;display:flex;align-items:center;
  justify-content:center;position:relative;overflow:hidden
}
.rc-art-bg{position:absolute;inset:0;opacity:0.25}
.rc-logo{
  width:52px;height:52px;object-fit:contain;
  position:relative;z-index:1;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6))
}
.rc-logo-ph{
  font-size:11px;font-weight:800;
  color:rgba(255,255,255,0.85);
  position:relative;z-index:1;
  letter-spacing:0.5px;text-align:center;padding:0 6px
}
.rc-live-dot{
  position:absolute;top:6px;left:6px;z-index:3;
  width:7px;height:7px;border-radius:50%;
  background:#333;
}
.rc-live-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.rc-live-dot.bad{background:var(--red);box-shadow:0 0 4px var(--red)}
.rc-info{padding:7px 9px 8px}
.rc-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}
.rc-cat{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:1px}

/* Recently watched card variation */
.rw-card{
  flex-shrink:0;width:160px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  cursor:pointer;
  transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;
}
.rw-card:hover{
  transform:translateY(-4px);
  border-color:var(--green);
  box-shadow:0 8px 30px rgba(0,0,0,0.5)
}
.rw-art{
  height:88px;display:flex;align-items:center;
  justify-content:center;position:relative;overflow:hidden
}
.rw-logo{width:64px;height:64px;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6))}
.rw-logo-ph{font-size:12px;font-weight:800;color:rgba(255,255,255,0.85);position:relative;z-index:1}
.rw-resume{
  position:absolute;bottom:0;left:0;right:0;
  height:3px;background:var(--surface2)
}
.rw-resume-fill{height:100%;background:var(--green)}
.rw-info{padding:7px 10px 9px}
.rw-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rw-time{font-size:10px;color:var(--muted);margin-top:1px}

/* ─── CHANNELS SCREEN ─── */
#sc-ch{flex-direction:column}
.toolbar{
  flex-shrink:0;padding:9px 16px;
  display:flex;align-items:center;gap:8px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-wrap:nowrap
}
.search-wrap{position:relative;width:150px;flex-shrink:0}
.search-wrap input{
  width:100%;background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;padding:7px 10px 7px 30px;
  color:var(--white);font-size:12px;outline:none;
  font-family:var(--font);transition:border-color 0.2s
}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{
  position:absolute;left:8px;top:50%;
  transform:translateY(-50%);color:var(--muted);
  font-size:12px;pointer-events:none
}
.pills{display:flex;gap:5px;overflow-x:auto;flex:1}
.pills::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;font-family:var(--font);
  transition:all 0.15s
}
.pill:hover{border-color:var(--green);color:var(--text)}
.pill.on{
  background:rgba(0,217,126,0.1);
  border-color:rgba(0,217,126,0.4);
  color:var(--green)
}
.grid-wrap{flex:1;overflow-y:auto;padding:14px 16px}
.ch-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px
}

/* ─── CHANNEL CARD (grid) ─── */
.ch-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  cursor:pointer;
  transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s
}
.ch-card:hover{
  transform:translateY(-3px);
  border-color:rgba(0,217,126,0.4);
  box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 16px var(--green-glow)
}
.ch-card:active{transform:scale(0.97)}
.card-art{
  height:80px;display:flex;align-items:center;
  justify-content:center;position:relative;flex-direction:column;gap:4px;
  overflow:hidden
}
.card-art-bg{position:absolute;inset:0;opacity:0.2}
.card-logo{
  width:60px;height:60px;object-fit:contain;
  position:relative;z-index:1;
  filter:drop-shadow(0 2px 10px rgba(0,0,0,0.7))
}
.card-label{
  font-size:11px;font-weight:800;
  color:rgba(255,255,255,0.9);
  position:relative;z-index:1;
  letter-spacing:0.5px;text-shadow:0 1px 4px rgba(0,0,0,0.8);
  text-align:center;padding:0 6px
}
.card-hdot{
  position:absolute;top:7px;left:7px;z-index:2;
  width:7px;height:7px;border-radius:50%;background:#333
}
.card-hdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.card-hdot.bad{background:var(--red)}
.card-body{padding:8px 10px}
.card-name{
  font-size:11px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;color:var(--white)
}
.card-cat{
  font-size:9px;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.5px
}

/* ─── PLAYER ─── */
#sc-player{flex-direction:row;background:#000}
#pv{flex:1;position:relative;background:#000}
video{width:100%;height:100%;object-fit:contain;background:#000;position:absolute;inset:0}
#ytc{position:absolute;inset:0;display:none}
#ytc iframe{width:100%;height:100%;border:none}

#pld{
  display:none;position:absolute;inset:0;
  background:rgba(8,10,13,0.85);
  align-items:center;justify-content:center;
  flex-direction:column;gap:12px;z-index:20;
  backdrop-filter:blur(4px)
}
#pld.on{display:flex}
.spn{
  width:36px;height:36px;
  border:3px solid var(--border);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin 0.8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.spt{font-size:11px;color:var(--green);font-weight:600;letter-spacing:0.5px}

#perr{
  display:none;position:absolute;inset:0;
  background:var(--bg);
  flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:28px;
  text-align:center;z-index:25
}
#perr.on{display:flex}
.err-icon{font-size:32px}
.err-title{font-size:15px;font-weight:800;color:var(--red)}
.err-body{font-size:11px;color:var(--muted);max-width:220px;line-height:1.6}
.err-nav{display:flex;gap:10px;margin-top:4px}
.err-nav-btn{
  display:flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:9px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;font-family:var(--font);
  transition:all 0.15s
}
.err-nav-btn.prev{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.err-nav-btn.prev:hover{border-color:var(--green);color:var(--green)}
.err-nav-btn.next{background:var(--green);color:#000}
.err-nav-btn.next:hover{background:var(--green2)}
.err-links{display:flex;flex-direction:column;gap:7px;width:100%;max-width:260px;margin-top:4px}
.erl{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 13px;border-radius:9px;text-decoration:none;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:11px;cursor:pointer;font-family:var(--font);
  transition:border-color 0.2s
}
.erl:hover,.erl:focus{border-color:var(--green);outline:none}
/* TV Remote / D-pad focus styles */
.ch-card:focus,.row-card:focus,.rw-card:focus,.side-ch-item:focus,
.pbtn:focus,.pill:focus,.nt:focus,.btn-watch:focus,.btn-info:focus,
.hdot:focus,.err-nav-btn:focus,.erl:focus{
  outline:3px solid var(--green);
  outline-offset:2px;
  box-shadow:0 0 0 5px rgba(0,217,126,0.18)
}

/* Player overlays */
#ptop{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:12px 16px;
  background:linear-gradient(to bottom,rgba(8,10,13,0.9),transparent);
  display:flex;justify-content:space-between;align-items:flex-start
}
#p-ch-name{font-size:14px;font-weight:700;color:var(--green)}
#p-ch-prog{font-size:10px;color:rgba(205,217,229,0.6);margin-top:2px}
#pbot{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:10px 14px;
  background:linear-gradient(to top,rgba(8,10,13,0.92),transparent)
}
.prog-bar{
  height:2px;background:rgba(255,255,255,0.1);
  border-radius:1px;margin-bottom:9px;overflow:hidden
}
.prog-fill{height:100%;background:var(--green);transition:width 1s linear}
.p-btns{display:flex;align-items:center;gap:7px}
.pbtn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.06);
  color:var(--white);width:34px;height:34px;
  border-radius:8px;cursor:pointer;
  font-size:12px;display:flex;align-items:center;
  justify-content:center;font-weight:700;
  font-family:var(--font);transition:background 0.15s
}
.pbtn:hover{background:rgba(255,255,255,0.15)}
.pbtn.big{
  background:var(--green);color:#000;
  width:40px;height:40px;font-size:14px;
  border:none;box-shadow:0 0 16px var(--green-glow)
}
.pbtn.big:hover{background:var(--green2)}
.pbtn.red{background:rgba(230,57,70,0.12);color:var(--red);border-color:rgba(230,57,70,0.2)}
.pbtn.blue{color:#4da6ff;background:rgba(77,166,255,0.08);border-color:rgba(77,166,255,0.15)}
.pbtn.fs{color:var(--green);background:rgba(0,217,126,0.08);border-color:rgba(0,217,126,0.15)}

/* Player sidebar */
#pside{
  width:240px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg2);border-left:1px solid var(--border)
}
.pside-head{
  padding:13px 15px 10px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(0,217,126,0.04),transparent)
}
.pside-ch{font-size:13px;font-weight:700;color:var(--green)}
.pside-cat{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.8px}
.pside-now{
  padding:10px 15px;border-bottom:1px solid var(--border);
  background:rgba(0,119,255,0.02)
}
.pside-now-l{
  font-size:8px;font-weight:700;
  letter-spacing:2px;color:#4da6ff;margin-bottom:4px
}
.pside-now-t{font-size:12px;font-weight:700;margin-bottom:2px}
.pside-now-s{font-size:10px;color:var(--muted);margin-bottom:6px;direction:ltr;font-variant-numeric:tabular-nums}
.pside-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.pside-bar-f{height:100%;background:#4da6ff;transition:width 1s linear}
#pside-up{flex:1;overflow-y:auto;padding:10px 15px}
.pup-label{
  font-size:8px;font-weight:700;
  letter-spacing:2px;color:var(--muted);
  margin-bottom:6px;text-transform:uppercase
}
.side-ch-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 0;border-bottom:1px solid rgba(30,45,61,0.5);
  cursor:pointer;transition:opacity 0.15s
}
.side-ch-item:hover{opacity:0.8}

  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0
}

.side-ch-dot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0}
.side-ch-dot.ok{background:var(--green);box-shadow:0 0 4px var(--green)}

/* TOAST */
#toast{
  position:fixed;bottom:16px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;padding:9px 16px;
  font-size:11px;color:var(--text);
  z-index:9999;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.5)
}
#toast.on{transform:translateX(-50%) translateY(0)}

/* FULLSCREEN */
#sc-player:fullscreen{flex-direction:column}
#sc-player:fullscreen #pside{display:none}
#sc-player:-webkit-full-screen{flex-direction:column}
#sc-player:-webkit-full-screen #pside{display:none}

  #sc-player{flex-direction:column}

  #pside-up{flex:1}
  .clock{display:none}

function getHist(){try{return JSON.parse(localStorage.getItem("lbn_h")||"[]");}catch(e){return[];}}

function recordWatch(chId){
  var ch=CH.find(function(c){return c.id===chId;});if(!ch)return;
  var h=getHist().filter(function(x){return x.id!==chId;});
  h.unshift({id:chId,name:ch.name,cat:ch.cat,ts:Date.now()});
  saveHist(h);
  var f=getFreq();f[chId]=(f[chId]||0)+1;
  try{localStorage.setItem("lbn_f",JSON.stringify(f));}catch(e){}
}
function clearHist(){
  try{localStorage.removeItem("lbn_h");localStorage.removeItem("lbn_f");}catch(e){}

}

// ─── CAROUSEL ───
var carouselItems=[],carouselIdx=0,carouselTimer=null;

function buildCarouselItems(){
  var hist=getHist();
  // Use recent watched first (up to 3), then fill with defaults
  var recent=hist.slice(0,3).map(function(h){return h.id;});
  var pool=recent.concat(CAROUSEL_DEFAULT.filter(function(id){return recent.indexOf(id)<0;}));
  // Deduplicate, max 5
  var seen={};
  var result=[];
  pool.forEach(function(id){
    if(!seen[id]&&CH.find(function(c){return c.id===id;})){
      seen[id]=true;result.push(id);
    }
    if(result.length>=5)return;
  });
  return result.slice(0,5);
}

function renderCarousel(){
  carouselItems=buildCarouselItems();
  var hero=document.getElementById("hero");
  // Remove old slides
  hero.querySelectorAll(".hero-slide").forEach(function(s){s.remove();});

  carouselItems.forEach(function(id,i){
    var ch=CH.find(function(c){return c.id===id;});if(!ch)return;
    var grad=HERO_GRADIENTS[ch.cat]||HERO_GRADIENTS.News;
    var logo=LOGOS[id];
    var slide=document.createElement("div");
    slide.className="hero-slide"+(i===0?" active":"");
    slide.innerHTML=
      '<div class="hero-bg" style="background:'+grad+'"></div>'+
      '<div class="hero-grad"></div>'+
      '<div class="hero-logo-badge">'+buildLogoEl(id,ch.name,ch.cat,'',48)+'</div>'+
      '<div class="hero-content">'+
        '<div class="hero-cat">'+ch.cat+' · LIVE NOW</div>'+
        '<div class="hero-title">'+ch.name+'</div>'+
        '<div class="hero-sub">'+getCatDesc(ch.cat)+'</div>'+
        '<div class="hero-btns">'+
          '<button class="btn-watch" onclick="playCh(\''+ch.id+'\')" tabindex="0"><div class="play-icon"></div>Watch Live</button>'+
          '<button class="btn-info" onclick="setCatFromHero(\''+ch.cat+'\')" tabindex="0">Browse '+ch.cat+'</button>'+
        '</div>'+
      '</div>';
    hero.insertBefore(slide,document.getElementById("hero-dots"));
  });

  // Dots
  var dotsEl=document.getElementById("hero-dots");
  dotsEl.innerHTML=carouselItems.map(function(_,i){
    return'<div class="hdot'+(i===0?' on':'')+'" onclick="goSlide('+i+')"></div>';
  }).join('');

  carouselIdx=0;
  startCarouselTimer();
}

function getCatDesc(cat){
  var map={
    Lebanon:"Lebanese TV — live news, entertainment & culture",
    News:"24-hour Arabic news coverage from the region and beyond",
    Sports:"Live sports, matches and analysis",
    Drama:"Arabic drama, series and entertainment",
    Gulf:"Gulf and Arabian peninsula television",
    Egypt:"Egyptian TV and entertainment",
    Kids:"Children's programming in Arabic",
    Religious:"Islamic programming and Quran",
    Documentary:"Documentaries and factual programming"
  };
  return map[cat]||"Live Arabic television";
}

function getCatDescShort(cat){
  var map={Lebanon:"Live Now",News:"Breaking News",Sports:"Live Sport",Drama:"Now Showing",Gulf:"Live TV",Egypt:"Live TV",Kids:"Kids TV",Religious:"Live TV",Documentary:"Now Showing"};
  return map[cat]||"Live";
}

function goSlide(idx){
  var slides=document.querySelectorAll(".hero-slide");
  var dots=document.querySelectorAll(".hdot");
  slides[carouselIdx].classList.remove("active");
  dots[carouselIdx].classList.remove("on");
  carouselIdx=idx;
  slides[carouselIdx].classList.add("active");
  dots[carouselIdx].classList.add("on");
  startCarouselTimer();
}

function nextSlide(){
  var next=(carouselIdx+1)%carouselItems.length;
  goSlide(next);
}

function startCarouselTimer(){
  if(carouselTimer)clearInterval(carouselTimer);
  carouselTimer=setInterval(nextSlide,6000);
}

  if(!sorted.length){sec.style.display="none";return;}
  sec.style.display="block";
  document.getElementById("fav-row").innerHTML=sorted.map(function(id){
    var ch=CH.find(function(c){return c.id===id;});if(!ch)return'';
    return makeRowCard(ch);
  }).join('');

        '<div class="card-art-bg" style="background:'+ch.color+'"></div>'+

        buildLogoEl(ch.id,ch.name,ch.cat,'card-logo',52)+
      '</div>'+
      '<div class="card-body">'+
        '<div class="card-name">'+ch.name+'</div>'+
        '<div class="card-cat">'+ch.cat+'</div>'+
      '</div></div>';
  }).join('');
}

// ─── HEALTH ───
function setOk(id){health[id]="ok";updateDots(id);}
function setDead(id){health[id]="dead";updateDots(id);}
function updateDots(id){
  document.querySelectorAll("[data-hdot='"+id+"']").forEach(function(d){
    d.className="card-hdot"+(health[id]==="ok"?" ok":health[id]==="dead"?" bad":"");
  });
  // also update row cards
  document.querySelectorAll(".rc-live-dot[data-hdot='"+id+"']").forEach(function(d){
    d.className="rc-live-dot"+(health[id]==="ok"?" ok":health[id]==="dead"?" bad":"");
  });
}

// ─── PLAYER ───
function playCh(id){
  var ch=CH.find(function(c){return c.id===id;});if(!ch)return;
  activeCh=ch;streamIdx=getBestIdx(ch);
  recordWatch(id);
  showPlayer(ch.name);
  document.getElementById("pside-ch").textContent=ch.name;
  document.getElementById("pside-cat").textContent=ch.cat+" · "+ch.flag;
  document.getElementById("pside-now-t").textContent="Live Stream";
  document.getElementById("pside-now-s").textContent=ch.cat;
  document.getElementById("prog-fill").style.width="60%";
  document.getElementById("p-ch-prog").textContent=ch.cat+" · Live";

  // Sidebar other channels
  var others=CH.filter(function(c){return c.id!==id;}).slice(0,20);
  document.getElementById('pup-slots').innerHTML=others.map(function(c){
    var h=health[c.id]||'';
    return'<div class="side-ch-item" onclick="playCh(\''+c.id+'\')" tabindex="0" onkeydown="if(event.keyCode===13)playCh(\''+c.id+'\')">'+
      '<div class="side-ch-logo">'+buildLogoEl(c.id,c.name,c.cat,'',22)+'</div>'+
      '<div class="side-ch-name">'+c.name+'</div>'+
      '<div class="side-ch-dot'+(h==='ok'?' ok':'')+'"></div>'+
    '</div>';
  }).join('');

  document.getElementById("vid").style.display="block";
  startStream(ch,streamIdx);
}

function startStream(ch,idx){
  var url=ch.streams[idx]||ch.streams[0];
  var vid=document.getElementById("vid");
  var ld=document.getElementById("pld"),er=document.getElementById("perr");
  ld.classList.add("on");er.classList.remove("on");vid.style.display="block";
  if(hlsObj){hlsObj.destroy();hlsObj=null;}

  function onErr(){
    setDead(ch.id);
    if(idx+1<ch.streams.length){
      showToast("Trying stream "+(idx+2)+"…");
      setTimeout(function(){startStream(ch,idx+1);},800);
    }else{
      ld.classList.remove("on");showErr(ch);
    }
  }

  if(window.Hls&&Hls.isSupported()){
    hlsObj=new Hls({debug:false,enableWorker:true,maxBufferLength:12,
      xhrSetup:function(x){x.timeout=10000;}});
    hlsObj.loadSource(url);hlsObj.attachMedia(vid);
    hlsObj.on(Hls.Events.MANIFEST_PARSED,function(){
      ld.classList.remove("on");setOk(ch.id);saveBest(ch.id,idx);
      vid.play().catch(function(){});
    });
    hlsObj.on(Hls.Events.ERROR,function(e,d){if(d.fatal)onErr();});
  }else if(vid.canPlayType("application/vnd.apple.mpegurl")){
    vid.src=url;
    vid.onloadedmetadata=function(){ld.classList.remove("on");setOk(ch.id);vid.play().catch(function(){});};
    vid.onerror=onErr;
  }else{
    vid.src=url;vid.oncanplay=function(){ld.classList.remove("on");setOk(ch.id);};vid.onerror=onErr;
  }
}

function showErr(ch){
  document.getElementById("perr").classList.add("on");
  document.getElementById("pld").classList.remove("on");
  document.getElementById("vid").style.display="none";
  // Show channel name in error
  document.getElementById("err-body").textContent="Could not load "+ch.name+". All streams failed.";
  // Update prev/next availability
  var i=CH.findIndex(function(c){return c.id===ch.id;});
  document.getElementById("err-prev").style.display=i>0?"flex":"none";
  document.getElementById("err-next").style.display=i<CH.length-1?"flex":"none";
  document.getElementById("err-links").innerHTML=
    (ch.web?"<a class='erl' href='"+ch.web+"' target='_blank' tabindex='0'><span>Official Website</span><span>→</span></a>":"")+
    "<button class='erl' onclick='retryStream()' tabindex='0'><span>Retry All Streams</span><span>↺</span></button>";
}

function showPlayer(name){
  document.getElementById("p-ch-name").textContent=name;
  document.querySelectorAll(".sc,.sc-flex").forEach(function(s){s.classList.remove("on");});
  document.querySelectorAll(".nt").forEach(function(b){b.classList.remove("on");});
  document.getElementById("sc-player").classList.add("on");
  var np=document.getElementById("nav-play");np.style.display="flex";np.classList.add("on");
  document.getElementById("pld").classList.add("on");
  document.getElementById("perr").classList.remove("on");
}

function retryStream(){
  document.getElementById("perr").classList.remove("on");
  if(activeCh)startStream(activeCh,0);
}

function closePlayer(){
  if(hlsObj){hlsObj.destroy();hlsObj=null;}
  var vid=document.getElementById("vid");vid.pause();vid.src="";
  document.getElementById("perr").classList.remove("on");
  document.getElementById("pld").classList.remove("on");
  document.getElementById("nav-play").style.display="none";
  activeCh=null;
  go("home",document.querySelectorAll(".nt")[0]);
}

function togPause(){
  var v=document.getElementById("vid"),b=document.getElementById("pbtn-play");
  if(v.paused){v.play();b.textContent="⏸";}else{v.pause();b.textContent="▶";}
}
function togMute(){
  var v=document.getElementById("vid"),b=document.getElementById("pbtn-mute");
  v.muted=!v.muted;b.textContent=v.muted?"🔇":"🔊";
}
function prevCh(){
  if(!activeCh)return;
  var i=CH.findIndex(function(c){return c.id===activeCh.id;});
  if(i>0)playCh(CH[i-1].id);
}
function nextCh(){
  if(!activeCh)return;
  var i=CH.findIndex(function(c){return c.id===activeCh.id;});
  if(i<CH.length-1)playCh(CH[i+1].id);
}
function goFullscreen(){
  var el=document.getElementById("sc-player");
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else{var v=document.getElementById("vid");if(v.webkitEnterFullscreen)v.webkitEnterFullscreen();}
}

// ─── TOAST ───
var toastTimer=null;
function showToast(msg){
  var el=document.getElementById("toast");el.textContent=msg;el.classList.add("on");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove("on");},3000);
}

// ─── BACKGROUND HEALTH CHECK ───
setTimeout(function(){
  if(!window.Hls||!Hls.isSupported())return;
  CH.filter(function(ch){return health[ch.id]!=='ok';}).slice(0,8).forEach(function(ch){
    var tryIdx=0;
    function tryNext(){
      if(tryIdx>=ch.streams.length){setDead(ch.id);return;}
      var h=new Hls({debug:false,maxBufferLength:0,maxMaxBufferLength:0,xhrSetup:function(x){x.timeout=7000;}});
      var done=false;
      var t=setTimeout(function(){if(!done){done=true;h.destroy();tryIdx++;tryNext();}},7000);
      h.loadSource(ch.streams[tryIdx]);
      h.on(Hls.Events.MANIFEST_PARSED,function(){
        if(!done){done=true;clearTimeout(t);setOk(ch.id);saveBest(ch.id,tryIdx);h.destroy();}
      });
      h.on(Hls.Events.ERROR,function(e,d){
        if(!done&&d.fatal){done=true;clearTimeout(t);h.destroy();tryIdx++;tryNext();}
      });
    }
    tryNext();
  });
},40000);

// Build an <img> with multi-source fallback, ending in styled initials
function buildLogoEl(chId,chName,chCat,cssClass,size){
  var sources=LOGO_SOURCES[chId]||[];
  var color=CAT_COLORS[chCat]||"#1a2535";
  var initials=chName.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
  var sz=size||48;
  // If no sources, return initials div immediately
  if(!sources.length){
    return'<div class="logo-initials" style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:'+(sz*0.32)+'px;font-weight:900;color:rgba(255,255,255,0.9);letter-spacing:-0.5px;flex-shrink:0">'+initials+'</div>';
  }
  // Build img with onerror chain through sources then initials
  var fallbackChain=sources.slice(1).map(function(src){
    return"this.src='"+src+"';";
  }).join('');
  var finalFallback="this.style.display='none';this.nextElementSibling.style.display='flex';";
  return'<img class="'+cssClass+'" src="'+sources[0]+'" width="'+sz+'" height="'+sz+'" style="object-fit:contain;flex-shrink:0" loading="lazy" onerror="'+fallbackChain+finalFallback+'">'+
    '<div class="logo-initials" style="display:none;width:'+sz+'px;height:'+sz+'px;background:'+color+';border-radius:8px;align-items:center;justify-content:center;font-size:'+(sz*0.32)+'px;font-weight:900;color:rgba(255,255,255,0.9);letter-spacing:-0.5px;flex-shrink:0">'+initials+'</div>';
}

// ─── TV REMOTE / KEYBOARD HANDLER ───
// Supports: Android TV, Fire Stick, Chromecast w/Google TV, smart TV browsers
// D-pad: Arrow keys navigate focus | OK/Enter: select | Back/Escape: go back
// Media keys: Play/Pause, Ch+/Ch- (PageUp/Down), Volume mapped by browser
(function(){
  // Make all interactive cards keyboard-focusable
  function makeFocusable(){
    var sel='.ch-card,.row-card,.rw-card,.side-ch-item,.pill,.hdot';
    document.querySelectorAll(sel).forEach(function(el){
      if(!el.getAttribute('tabindex'))el.setAttribute('tabindex','0');
    });
  }
  // Re-run after renders
  var origRenderGrid=window.renderGrid;
  window.renderGrid=function(){origRenderGrid();setTimeout(makeFocusable,50);};
  var origRenderHome=window.renderHome;
  window.renderHome=function(){origRenderHome();setTimeout(makeFocusable,50);};

  document.addEventListener('keydown',function(e){
    var key=e.keyCode||e.which;
    var active=document.activeElement;
    var inPlayer=!!document.getElementById('sc-player').classList.contains('on');

    // ── Media keys ──
    if(key===179||key===32){  // MediaPlayPause or Space
      if(inPlayer){e.preventDefault();togPause();return;}
    }
    if(key===228||key===34){  // Channel Down / PageDown
      e.preventDefault();nextCh();return;
    }
    if(key===227||key===33){  // Channel Up / PageUp
      e.preventDefault();prevCh();return;
    }
    if(key===173||key===77){  // Mute / M
      if(inPlayer){togMute();return;}
    }
    if(key===70){  // F = fullscreen
      if(inPlayer){goFullscreen();return;}
    }

    // ── Back / Escape ──
    if(key===27||key===8||key===461){  // Escape / Backspace / Back
      if(inPlayer){e.preventDefault();closePlayer();return;}
      // If on channels screen go home
      if(document.getElementById('sc-ch').classList.contains('on')){
        e.preventDefault();go('home',document.querySelectorAll('.nt')[0]);return;
      }
    }

    // ── Enter / OK — activate focused element ──
    if(key===13){
      if(active&&active!==document.body){
        active.click();return;
      }
    }

    // ── Arrow key D-pad navigation ──
    var ARROW={37:'left',38:'up',39:'right',40:'down'};
    if(!ARROW[key])return;
    e.preventDefault();

    // If nothing focused, focus first focusable
    if(!active||active===document.body){
      var first=document.querySelector('.ch-card[tabindex],button.nt,.btn-watch');
      if(first)first.focus();
      return;
    }

    // Get all currently visible focusable elements
    var focusable=Array.from(document.querySelectorAll(
      '#sc-player.on .pbtn,#sc-player.on .side-ch-item,#sc-player.on .err-nav-btn,#sc-player.on .erl,'+
      '#sc-home.on .btn-watch,#sc-home.on .btn-info,#sc-home.on .row-card,#sc-home.on .rw-card,#sc-home.on .sec-more,#sc-home.on .hdot,'+
      '#sc-ch.on .pill,#sc-ch.on .ch-card,'+
      'button.nt'
    )).filter(function(el){
      var r=el.getBoundingClientRect();
      return r.width>0&&r.height>0;
    });

    if(!focusable.length)return;
    var idx=focusable.indexOf(active);
    if(idx<0){focusable[0].focus();return;}

    var dir=ARROW[key];
    var ar=active.getBoundingClientRect();
    var cx=ar.left+ar.width/2, cy=ar.top+ar.height/2;

    // Find best candidate in the arrow direction
    var best=null,bestScore=Infinity;
    focusable.forEach(function(el){
      if(el===active)return;
      var r=el.getBoundingClientRect();
      var ex=r.left+r.width/2, ey=r.top+r.height/2;
      var dx=ex-cx, dy=ey-cy;
      var inDir=false;
      if(dir==='right'&&dx>5)inDir=true;
      if(dir==='left'&&dx<-5)inDir=true;
      if(dir==='down'&&dy>5)inDir=true;
      if(dir==='up'&&dy<-5)inDir=true;
      if(!inDir)return;
      // Score: primary axis distance + weighted perpendicular
      var primary=dir==='left'||dir==='right'?Math.abs(dx):Math.abs(dy);
      var perp=dir==='left'||dir==='right'?Math.abs(dy):Math.abs(dx);
      var score=primary+perp*0.5;
      if(score<bestScore){bestScore=score;best=el;}
    });

    if(best){
      best.focus();
      // Scroll into view smoothly
      best.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
    } else {
      // Wrap around at edges
      if(dir==='right'||dir==='down')focusable[0].focus();
      else focusable[focusable.length-1].focus();
    }
  });

  // Initial focusable setup
  setTimeout(makeFocusable,500);
})();
