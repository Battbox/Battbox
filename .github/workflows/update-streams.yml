name: Nightly Stream Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-streams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch iptv-org streams API
        run: |
          echo "Fetching stream data..."
          curl -s --max-time 60 --retry 3 \
            "https://iptv-org.github.io/api/streams.json" \
            -o streams.json
          
          if [ $(wc -c < streams.json) -lt 10000 ]; then
            echo "ERROR: Download failed or file too small"
            exit 1
          fi

      - name: Patch stream URLs into app
        run: |
          python3 << 'PYEOF'
import json, re, sys

# Mapping your app IDs to iptv-org IDs
ID_MAP = {
    "aljadeed": "AlJadeed.lb", "lbc": "LBCInternational.lb", "mtv-lb": "MTVLebanon.lb",
    "mayadeen": "AlMayadeen.lb", "manar": "AlManar.lb", "aljazeera": "AlJazeera.qa",
    "ajm": "AlJazeeraMubasher.qa", "ajd": "AlJazeeraDocumentary.qa", "alarabiya": "AlArabiya.ae",
    "alaraby": "AlAraby.qa", "france24": "France24Arabic.fr", "dw-ar": "DWArabic.de",
    "trt-ar": "TRTArabi.tr", "alhurra": "Alhurra.us", "mbc1": "MBC1.sa",
    "mbc-drama": "MBCDrama.sa", "mbc-iraq": "MBCIraq.iq", "mbc-masr": "MBCMasr.eg",
    "spacetoon": "Spacetoon.ae", "mbc3": "MBC3.sa", "ad-sport1": "AbuDhabiSports1.ae",
    "roya": "RoyaTV.jo", "jordan-tv": "JordanTV.jo", "qatar-tv": "QatarTV.qa",
    "iqraa": "Iqraa.sa", "sky-news-ar": "SkyNewsArabia.ae"
}

try:
    with open("streams.json", "r", encoding="utf-8") as f:
        streams = json.load(f)
    with open("libnan-tv.html", "r", encoding="utf-8") as f:
        html = f.read()
except Exception as e:
    print(f"File Access Error: {e}")
    sys.exit(1)

# Index active, non-blocked m3u8 streams
stream_data = {}
for s in streams:
    chid = s.get("channel")
    url = s.get("url", "")
    status = s.get("status", "")
    label = s.get("label", "") or ""
    if chid and url and ".m3u8" in url.lower() and status not in ("timeout", "error"):
        if "geo-blocked" not in label.lower():
            if chid not in stream_data: stream_data[chid] = []
            stream_data[chid].append(url)

updated = 0
for our_id, api_id in ID_MAP.items():
    new_urls = stream_data.get(api_id, [])
    if not new_urls: continue

    # Targeting the shorthand "u:" property used in your latest HTML
    pattern = r'(id\s*:\s*"' + re.escape(our_id) + r'".*?u\s*:\s*\[)([^\]]*)(\])'
    match = re.search(pattern, html, re.DOTALL)
    
    if match:
        existing_urls = re.findall(r'"(https?://[^"]+)"', match.group(2))
        
        # Merge: 2 freshest API links + existing links (Unique, Max 4)
        combined = []
        for u in (new_urls[:2] + existing_urls):
            if u not in combined: combined.append(u)
        
        final_list = combined[:4]
        formatted = ',\n     '.join(f'"{u}"' for u in final_list)
        replacement = f"{match.group(1)}\n     {formatted}\n   {match.group(3)}"
        
        new_html = html[:match.start()] + replacement + html[match.end():]
        if new_html != html:
            html = new_html
            updated += 1

with open("libnan-tv.html", "w", encoding="utf-8") as f:
    f.write(html)
print(f"Updated {updated} channels.")
PYEOF

      - name: Commit and Push
        run: |
          git config user.name "Stream Bot"
          git config user.email "bot@libnan.tv"
          git add libnan-tv.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: sync streams $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Cleanup
        if: always()
        run: rm -f streams.json
        
