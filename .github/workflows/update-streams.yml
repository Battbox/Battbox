name: Nightly Stream Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-streams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch iptv-org streams API
        run: |
          echo "Fetching stream data from iptv-org..."
          curl -s --max-time 30 --retry 3 \
            "https://iptv-org.github.io/api/streams.json" \
            -o streams.json
          
          # Validate download size
          SIZE=$(wc -c < streams.json)
          echo "Downloaded $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: streams.json too small, download likely failed"
            exit 1
          fi

      - name: Patch stream URLs into app
        run: |
          python3 << 'PYEOF'
          import json, re, sys

          # Map of internal app IDs to iptv-org channel IDs
          ID_MAP = {
            "aljadeed":     "AlJadeed.lb",
            "lbc":          "LBCInternational.lb",
            "mtv-lb":       "MTVLebanon.lb",
            "mayadeen":     "AlMayadeen.lb",
            "manar":        "AlManar.lb",
            "aljazeera":    "AlJazeera.qa",
            "ajm":          "AlJazeeraMubasher.qa",
            "ajd":          "AlJazeeraDocumentary.qa",
            "alarabiya":    "AlArabiya.ae",
            "alaraby":      "AlAraby.qa",
            "france24":     "France24Arabic.fr",
            "dw-ar":        "DWArabic.de",
            "trt-ar":       "TRTArabi.tr",
            "alhurra":      "Alhurra.us",
            "mbc1":         "MBC1.ae",
            "mbc-drama":    "MBCDrama.ae",
            "mbc4":         "MBC4.ae",
            "mbc5":         "MBC5.ae",
            "mbc-iraq":     "MBCIraq.iq",
            "mbc-masr":     "MBCMasr.eg",
            "mbc-masr2":    "MBCMasr2.eg",
            "mbc3":         "MBC3.ae",
            "spacetoon":    "Spacetoon.ae",
            "ad-sport1":    "AbuDhabiSports1.ae",
            "ad-sport2":    "AbuDhabiSports2.ae",
            "roya":         "RoyaTV.jo",
            "jordan-tv":    "JordanTV.jo",
            "qatar-tv":     "QatarTV.qa",
            "iqraa":        "Iqraa.sa",
            "al-iraqiya":   "AlIraqiya.iq",
            "alsumaria":    "AlSumaria.iq",
            "alsharqiya":   "AlSharqiya.iq",
            "rudaw":        "Rudaw.iq",
            "kurdistan24":  "Kurdistan24.iq",
            "sky-news-ar":  "SkyNewsArabia.ae"
          }

          try:
            with open("streams.json", "r", encoding="utf-8") as f:
              streams = json.load(f)
            with open("libnan-tv.html", "r", encoding="utf-8") as f:
              html = f.read()
          except Exception as e:
            print(f"ERROR: File access failed: {e}")
            sys.exit(1)

          # Extract only relevant streams from API
          api_data = {}
          for s in streams:
            chid = s.get("channel")
            url = s.get("url")
            if chid and url and ".m3u8" in url.lower():
              if chid not in api_data: api_data[chid] = []
              api_data[chid].append(url)

          updated = 0
          skipped = 0

          for our_id, api_id in ID_MAP.items():
            urls = api_data.get(api_id, [])
            if not urls:
              skipped += 1
              continue

            # Regex to find the 'u' (urls) array for this channel ID
            pattern = rf'(id:\s*"{our_id}",.*?u:\s*\[)([^\]]*)(\])'
            
            def make_replacer(new_urls):
              def replacer(m):
                prefix, existing_str, suffix = m.group(1), m.group(2), m.group(3)
                # Parse current URLs in HTML
                existing_urls = re.findall(r'"(https?://[^"]+)"', existing_str)
                
                # Combine: prioritize new URLs, remove duplicates, limit to 4
                combined = []
                for u in new_urls:
                  if u not in combined: combined.append(u)
                for u in existing_urls:
                  if u not in combined: combined.append(u)
                
                final_list = combined[:4]
                formatted = ',\n     '.join(f'"{u}"' for u in final_list)
                return f"{prefix}\n     {formatted}\n   {suffix}"
              return replacer

            new_html = re.sub(pattern, make_replacer(urls), html, flags=re.DOTALL)
            if new_html != html:
              html = new_html
              updated += 1
              print(f"  Updated: {our_id}")
            else:
              skipped += 1

          try:
            with open("libnan-tv.html", "w", encoding="utf-8") as f:
              f.write(html)
            print(f"\nResult: {updated} channels updated, {skipped} skipped.")
          except Exception as e:
            print(f"ERROR: Could not write to libnan-tv.html: {e}")
            sys.exit(1)
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "Stream Sync Bot"
          git config user.email "bot@libnan.tv"
          git add libnan-tv.html
          if git diff --staged --quiet; then
            echo "No changes found. Skipping commit."
          else
            git commit -m "chore: nightly stream sync [$(date +'%Y-%m-%d')]"
            git push
          fi
